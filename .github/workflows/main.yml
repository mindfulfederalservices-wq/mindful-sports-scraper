name: Mindful Sports Scraper Autopilot

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs automatically every 5 minutes
  workflow_dispatch:       # Keeps your manual "Run workflow" button active

jobs:
  scrape-and-stream:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-with: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper and Stream Live Data
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
          BASE44_APP_URL: ${{ secrets.BASE44_APP_URL }}
        run: python scraper.py
