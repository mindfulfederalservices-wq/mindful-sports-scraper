name: Sports Scraper Automation Loop

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: # 🌟 This line is what creates the "Run workflow" button!

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Scraper Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Scraper and Inject Sheets Data
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      run: python scraper.py  # 🌟 This ensures your scraper runs, not a "main" file!
